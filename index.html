<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cum să faci bani cu AI & YouTube Shorts | Viralio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { 
                        viralio: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81', accent: '#ec4899' } 
                    } 
                } 
            }
        }
    </script>

    <style>
        body { background-color: #F8FAFC; overflow-x: hidden; }
        .bg-gradient-viralio { background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%); }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animațiile luate "de la prietenul tău" */
        @keyframes slideLight {
            0% { transform: translateX(-100%); }
            60% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes bounceZoom {
            0% { transform: scale(0.7); opacity: 0; }
            60% { transform: scale(1.13); opacity: 1; }
            80% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="md:p-4">

    <div class="bg-white md:rounded-[1.5rem] min-h-screen shadow-xl overflow-hidden relative pb-10 border border-slate-100">
        
        <div class="pointer-events-none absolute inset-0 overflow-hidden">
            <div class="absolute top-[10%] right-[-10%] h-[500px] w-[500px] bg-red-500/10 rounded-full blur-[120px] mix-blend-multiply"></div>
            <div class="absolute top-[30%] left-[-10%] h-[500px] w-[500px] bg-indigo-500/10 rounded-full blur-[120px] mix-blend-multiply"></div>
        </div>

        <div class="sticky top-0 z-50 flex w-full justify-center px-2 py-4 md:p-2 max-w-screen-2xl mx-auto">
            <nav class="w-full rounded-2xl border border-slate-200 bg-white/80 backdrop-blur-xl md:mx-12 shadow-sm px-5 md:px-8 py-3 flex justify-between items-center">
                <a class="flex items-center font-black text-2xl tracking-tight text-slate-900" href="/">
                    <div class="w-9 h-9 rounded-xl bg-gradient-viralio flex items-center justify-center text-white mr-2.5 shadow-md"><i class="fa-solid fa-bolt"></i></div>
                    Viralio
                </a>
                <div class="flex items-center justify-end space-x-3">
                    <a href="/login" class="px-5 py-2 bg-slate-900 text-white rounded-xl hover:bg-viralio-600 transition-all font-semibold shadow-md text-sm hidden md:block">
                        Intră în cont
                    </a>
                </div>
            </nav>
        </div>

        <div class="relative z-10 w-full text-center pt-10 md:pt-16 px-4">
            
            <h1 class="mx-auto max-w-4xl text-4xl md:text-[3.2rem] leading-tight font-extrabold tracking-tight text-slate-900 mb-8">
                Cum să faci bani cu adevărat <br class="hidden md:block"> folosind <span class="text-transparent bg-clip-text bg-gradient-viralio">AI și YouTube Shorts</span>
            </h1>

            <div class="mx-auto mb-12 w-full max-w-[800px]">
                <div class="relative aspect-video w-full overflow-hidden rounded-[1.5rem] border-[6px] border-slate-100 shadow-2xl bg-slate-900">
                    <iframe class="absolute top-0 left-0 w-full h-full" 
                            src="https://www.youtube.com/embed/rFV6LF7MHCg?start=734" 
                            title="Cum să faci bani cu AI YouTube Shorts" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="flex justify-center pb-20 md:pb-32">
                <a href="/">
                    <button class="relative inline-flex cursor-pointer items-center justify-center overflow-hidden rounded-2xl px-8 py-4 text-xl font-bold text-white shadow-xl transition-all focus:outline-none hover:opacity-95" 
                            style="background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%); animation: bounceZoom 0.6s cubic-bezier(.68,-0.55,.27,1.55);">
                        
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent" 
                             style="animation: slideLight 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
                        
                        <span class="relative z-10 max-md:text-lg">Începe să folosești Viralio</span>
                        <span class="relative z-10 ml-2 text-[1.5rem] leading-none">→</span>
                    </button>
                </a>
            </div>
            
        </div>

        <div class="border-t border-slate-200 mt-auto bg-slate-50 rounded-b-[1.5rem]">
            <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center text-slate-400 font-medium text-sm">
                    <i class="fa-solid fa-bolt mr-2"></i> Viralio. Toate drepturile rezervate. © 2026
                </div>
                <div class="flex gap-6 text-sm font-medium text-slate-500">
                    <a href="#" class="hover:text-slate-900 transition-colors">Termeni și Condiții</a>
                    <a href="#" class="hover:text-slate-900 transition-colors">Confidențialitate</a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
